get:
  summary: 認可コールバック
  description: リソースオーナー認証後、OP からのリダイレクトを受け取り、認証処理を完了するエンドポイント。
  operationId: callback
  tags:
    - auth
  security: []
  parameters:
    - name: code
      in: query
      required: false
      description: |
        OP が発行した Authorization Code。
        `error` パラメータが存在する場合は省略される（RFC 6749 Section 4.1.2, 4.1.2.1）。
      schema:
        type: string
    - name: state
      in: query
      required: true
      description: Authorization Request 時に付与した state 値（RFC 6749 Section 4.1.2）
      schema:
        type: string
    - name: error
      in: query
      required: false
      description: |
        認可エラー時に OP が返すエラーコード（RFC 6749 Section 4.1.2.1）。
        このパラメータが存在する場合、認可は失敗している。
      schema:
        type: string
        enum:
          - invalid_request
          - access_denied
          - unauthorized_client
          - unsupported_response_type
          - invalid_scope
          - server_error
          - temporarily_unavailable
    - name: error_description
      in: query
      required: false
      description: エラーの詳細説明（RFC 6749 Section 4.1.2.1）
      schema:
        type: string
  responses:
    "302":
      description: 認証成功。Set-Cookie でセッションを設定し、フロントエンドアプリへリダイレクトする。
      headers:
        Location:
          description: リダイレクト先のフロントエンドアプリ URL。/login 時に指定された return_to の値。
          schema:
            type: string
            format: uri
        Set-Cookie:
          description: |
            セッション ID を格納した Cookie。
            属性: HttpOnly, Secure, SameSite=（サーバー設定値）
          schema:
            type: string
            example: session_id=<session-id>; HttpOnly; Secure; SameSite=Lax; Path=/
    "400":
      description: |
        リクエストパラメータ不正。以下のケースを含む。
        - state パラメータが欠落
        - code と error の両方が欠落
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yml
          examples:
            invalidRequest:
              $ref: ../components/examples/ErrorInvalidRequest.yml
    "403":
      description: |
        認証・認可失敗。以下のケースを含む。
        - OP からの error パラメータが存在する（認可拒否等）
        - state の検証失敗（不一致、TTL 切れ含む）
        - id_token の署名検証失敗
        - id_token の Claims 検証失敗
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yml
          examples:
            stateMismatch:
              $ref: ../components/examples/ErrorStateMismatch.yml
            tokenVerificationFailed:
              $ref: ../components/examples/ErrorTokenVerificationFailed.yml
    "500":
      description: サーバーエラー
      content:
        application/json:
          schema:
            $ref: ../components/schemas/Error.yml
          examples:
            serverError:
              $ref: ../components/examples/ErrorServerError.yml
